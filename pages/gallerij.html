<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto's - KVK Ettelgem</title>

    <script src="https://kit.fontawesome.com/bd0d3608a5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/favicon.png" type="image/png">
</head>
<body>

<header class="header">
    <a href="../index.html" class="logo">
        <i class="fa fa-futbol-o"></i> KVK Ettelgem
    </a>
    
    <nav class="navbar">
        <a href="../index.html" class="nav-link" data-page="home">Home</a>
        <a href="kalender.html" class="nav-link" data-page="kalender">Kalender</a>
        <a href="uitslagen.html" class="nav-link" data-page="uitslagen">Rangschikking</a>
        <a href="evenementen.html" class="nav-link" data-page="evenementen">Evenementen</a>
        <a href="gallerij.html" class="nav-link" data-page="gallerij">Foto's</a>
        <a href="contact.html" class="nav-link" data-page="contact">Contact</a>
    </nav>

    <div class="icons">
        <div id="menu-btn" class="fas fa-bars"></div>
    </div>
</header>

<main>
  <section class="hero results-hero">
      <div class="hero-content">
          <h1>Foto Galerij</h1>
          <p>Bekijk foto's van vroeger en nu, altijd KVK</p>
      </div>
  </section>

  <section class="gallery-section">
    <div class="gallery-container">
        
        <!-- Filter Tabs -->
        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">Alle foto's</button>
            
            <button class="filter-btn" data-filter="evenementen">Evenementen</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid">
            
            <!-- Wedstrijden -->
            <div class="gallery-item" data-category="wedstrijden">
                <img src="../img/78.jpg" alt="Wedstrijd Ettelgem 78" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Ettelgem 78 </p>
                </div>
            </div>

            <div class="gallery-item" data-category="wedstrijden">
                <img src="../img/82.jpg" alt="Wedstrijd Ettelgem 82" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Ettelgem 82 </p>
                </div>
            </div>

            <!-- Evenementen -->
            <div class="gallery-item" data-category="evenementen">
                <img src="../img/bestuur etc.jpg" alt="Bestuur KVK Ettelgem" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Bestuur & Vrijwilligers</p>
                </div>
            </div>

            <!-- Sponsors -->
           
            <!-- Voeg meer foto's toe door nieuwe .gallery-item divs te maken -->
            
        </div>

        <div class="gallery-empty" style="display: none;">
            <i class="fas fa-images"></i>
            <p>Geen foto's gevonden in deze categorie</p>
        </div>

    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
      <button class="lightbox-close" aria-label="Sluiten">&times;</button>
      <button class="lightbox-prev" aria-label="Vorige">
          <i class="fas fa-chevron-left"></i>
      </button>
      <button class="lightbox-next" aria-label="Volgende">
          <i class="fas fa-chevron-right"></i>
      </button>
      <div class="lightbox-content">
          <img src="" alt="" id="lightbox-img">
          <p id="lightbox-caption"></p>
      </div>
  </div>

</main>

<script type="module" src="../js/script.js"></script>

<footer class="footer"></footer>

</body>
</html>
