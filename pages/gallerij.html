<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto's - KVK Ettelgem</title>

    <script src="https://kit.fontawesome.com/bd0d3608a5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/favicon.png" type="image/png">
</head>
<body>

<header class="header"></header>

<main>
  <section class="hero results-hero">
      <div class="hero-content">
          <h1>Foto Galerij</h1>
          <p>Bekijk foto's van vroeger en nu, altijd KVK</p>
      </div>
  </section>

    <section class="gallery-section page-section">
    <div class="gallery-container">
        <div class="gallery-filters">
            <button class="filter-btn active" type="button" data-filter="all">Alle foto's</button>
            <button class="filter-btn" type="button" data-filter="evenementen">Evenementen</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="wedstrijden">
            <img src="../img/78.jpg" alt="Wedstrijd Ettelgem 78" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Ettelgem 78</p>
                </div>
            </div>

            <div class="gallery-item" data-category="wedstrijden">
                <img src="../img/82.jpg" alt="Wedstrijd Ettelgem 82" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Ettelgem 82</p>
                </div>
            </div>

            <div class="gallery-item" data-category="evenementen">
                <img src="../img/bestuur etc.jpg" alt="Bestuur KVK Ettelgem" loading="lazy">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Bestuur & Vrijwilligers</p>
                </div>
            </div>
        </div>

        <div class="gallery-empty hidden">
            <i class="fas fa-images"></i>
            <p>Geen foto's gevonden in deze categorie</p>
        </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Fotolightbox">
      <button class="lightbox-close" type="button" aria-label="Sluiten">&times;</button>
      <button class="lightbox-prev" type="button" aria-label="Vorige">
          <i class="fas fa-chevron-left"></i>
      </button>
      <button class="lightbox-next" type="button" aria-label="Volgende">
          <i class="fas fa-chevron-right"></i>
      </button>
      <div class="lightbox-content">
          <img src="" alt="" id="lightbox-img">
          <p id="lightbox-caption"></p>
      </div>
  </div>

</main>

<script type="module" src="../netlify/js/script.js"></script>

<footer class="footer"></footer>

</body>
</html>
